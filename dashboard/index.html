body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8fafc;color:#0f172a;min-height:100vh;display:flex;flex-direction:column}
header{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}

.stats{display:flex;gap:20px;font-size:13px;color:#64748b}
.stats strong{color:#0f172a;font-weight:600}
.filters{background:#fff;border-bottom:1px solid #e2e8f0;padding:8px 24px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.lbl{font-size:12px;color:#64748b;white-space:nowrap}
select,input{height:30px;padding:0 8px;border:1px solid #e2e8f0;border-radius:5px;font-size:12px;background:#fff;color:#0f172a}
select:focus,input:focus{border-color:#94a3b8;outline:none}
input[type=text]{width:120px}
.filt-co{width:120px}.filt-ro{width:170px}
.table-wrap{flex:1;overflow:auto;padding:12px 24px}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:7px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);font-size:13px}
thead{position:sticky;top:0;z-index:1}
th{background:#f1f5f9;padding:9px 10px;text-align:left;font-size:11px;font-weight:600;color:#64748b;border-bottom:1px solid #e2e8f0;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{background:#e2e8f0}
td{padding:8px 10px;border-bottom:1px solid #e2e8f0;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8fafc}
tr.s50 td{background:rgba(34,197,94,.04)}
tr.s45 td,tr.s44 td,tr.s43 td,tr.s42 td,tr.s41 td,tr.s40 td{background:rgba(134,239,172,.05)}
tr.s39 td,tr.s38 td,tr.s37 td,tr.s36 td,tr.s35 td{background:rgba(234,179,8,.04)}
.sco{display:inline-block;padding:2px 7px;border-radius:9px;font-size:11px;font-weight:600}
.sco.g{background:#22c55e;color:#fff}
.sco.lg{background:#86efac;color:#166534}
.sco.y{background:#eab308;color:#fff}
.sco.r{background:#ef4444;color:#fff}
.sel{border:none;background:transparent;font-size:12px;padding:2px 4px;border-radius:4px;cursor:pointer}

.but{width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;border:1px solid #e2e8f0;border-radius:4px;background:#fff;cursor:pointer;text-decoration:none;font-size:10px;color:#64748b}
.but:hover{background:#f1f5f9;color:#0f172a}
.but.url{color:#3b82f6}
.but.url:hover{background:#eff6ff}
.pad{color:#94a3b8;font-size:12px}

.ov{position:fixed;inset:0;background:rgba(0,0,0,.3);opacity:0;pointer-events:none;transition:opacity .2s;z-index:100}
.ov.o{opacity:1;pointer-events:auto}
.pn{position:fixed;top:0;right:0;width:480px;max-width:100%;height:100vh;background:#fff;box-shadow:-4px 0 20px rgba(0,0,0,.1);transform:translateX(100%);transition:transform .2s;z-index:101;display:flex;flex-direction:column;overflow:hidden}
.pn.o{transform:translateX(0)}
.ph{padding:12px 16px;border-bottom:1px solid #e2e8f0;display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0}
.pt{font-size:13px;font-weight:600;line-height:1.3}
.ps{font-size:11px;color:#64748b;margin-top:2px}
.xb{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border:1px solid #e2e8f0;border-radius:4px;background:none;cursor:pointer;font-size:12px;color:#64748b;flex-shrink:0;margin-left:8px}
.xb:hover{background:#f1f5f9}
.tabs{display:flex;border-bottom:1px solid #e2e8f0;flex-shrink:0}
.tab{padding:8px 14px;font-size:12px;font-weight:500;border:none;border-bottom:2px solid transparent;background:none;cursor:pointer;color:#64748b}
.tab.o{color:#0f172a;border-bottom-color:#0f172a}
.pc{flex:1;overflow:auto;padding:14px}
.pk{font-size:12px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin:12px 0 6px}
.pk:first-child{margin-top:0}
.pp{margin:5px 0;line-height:1.5;font-size:12px}
.pl{list-style:none;padding:0;margin:5px 0}
.pl li{margin:3px 0 3px 14px}
.pl li::before{content:'– '}
.pa{color:#3b82f6;text-decoration:none;font-size:12px}
.pa:hover{text-decoration:underline}
.badg{display:inline-block;font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;margin-left:4px}
.badg.g{background:#22c55e;color:#fff}
.badg.lg{background:#86efac;color:#166534}
.badg.y{background:#eab308;color:#fff}
.badg.r{background:#ef4444;color:#fff}
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(60px);background:#0f172a;color:#fff;padding:8px 16px;border-radius:7px;font-size:12px;z-index:200;transition:transform .2s;white-space:nowrap}
.toast.o{transform:translateX(-50%) translateY(0)}
.sc{font-size:11px;color:#64748b;padding:2px 6px;border:1px solid #e2e8f0;border-radius:4px}
.sc.g{background:rgba(34,197,94,.1);border-color:#86efac}

.sc.y{background:rgba(234,179,8,.1);border-color:#fde047}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}
.msg{text-align:center;padding:40px;color:#94a3b8;font-size:13px}
</style>
</head>

h+='<td><span class="sco '+sc(r.s)+'">'+r.s.toFixed(1)+badge(r.s)+'</span></td>';
h+='<td>'+r.n+'</td>';
h+='<td>'+r.c+'</td>';
h+='<td title="'+r.r+'">'+trunc(r.r,30)+'</td>';
h+='<td><select class=sel onchange="chg(this,\''+r.n+'\',\''+r.c.replace(/'/g,"\\'")+'\')">'+stOpts(r.st)+'</select></td>';
h+='<td><a class=but href="'+r.ln+'" target=_blank>📄</a></td>';
h+='<td><a class="but url" href="'+(r.u||r.ln)+'" target=_blank>🔗</a></td>';
h+='</tr>';
}
tbEl.innerHTML=h;
}
function chg(el,num,company){
var ns=el.value;
for(var i=0;i<D.length;i++){
if(D[i].n===num&&D[i].c===company){D[i].st=ns;break;}
}
r();
to('Status: '+ns);
}
function det(num){
for(var i=0;i<D.length;i++){
if(D[i].n===num){curRow=D[i];break;}
}
if(!curRow)return;
ptEl.textContent=curRow.c+' — '+curRow.r;
var scCls=sc(curRow.s);
psEl.innerHTML='<span class="sc '+scCls+'">'+curRow.s.toFixed(1)+'/5</span> '+curRow.st;
trEl.className='tab'+(curTab==='report'?' o':'');
tcEl.className='tab'+(curTab==='cover'?' o':'');
ovEl.className='ov o';
pnEl.className='pn o';
pc(curTab);
}
function pc(tab){
curTab=tab;
trEl.className='tab'+(tab==='report'?' o':'');
tcEl.className='tab'+(tab==='cover'?' o':'');
if(!curRow){pcEl.innerHTML='<p class=msg>Select a row</p>';return;}
var ln=curRow.ln;
if(tab==='report'){
pcEl.innerHTML='<p class=pk>Report</p><p class=pp>Open in editor or server:</p><p class=pp><a class=pa href="'+ln+'" target=_blank>'+ln+'</a></p>';
}else{
var cl='cover-letters/'+curRow.n+'-'+curRow.c.toLowerCase().replace(/[^a-z0-9]+/g,'-')+'.md';
pcEl.innerHTML='<p class=pk>Cover Letter</p><p class=pp>Open in editor:</p><p class=pp><a class=pa href="'+cl+'" target=_blank>'+cl+'</a></p>';
}
}
function url(num){
for(var i=0;i<D.length;i++){
if(D[i].n===num){curRow=D[i];break;}
}
if(!curRow)return;
to('Fetching job URL…');
pc('report');
}
function to(msg){
toEl.textContent=msg;
toEl.className='toast o';
clearTimeout(window._tt);
window._tt=setTimeout(function(){toEl.className='toast';},2800);
}
function close(){
ovEl.className='ov';
pnEl.className='pn';
curRow=null;
}
ovEl.onclick=close;
xbEl.onclick=close;
trEl.onclick=function(){pc('report');};
tcEl.onclick=function(){pc('cover');};
sfEl.onchange=r;
cfEl.oninput=r;
rfEl.oninput=r;
stfEl.onchange=r;
r();
window.chg=chg;
})();
</script>
